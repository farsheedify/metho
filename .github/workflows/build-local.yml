name: build-docker-artifacts

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t bb-methodology .

      - name: Save image to tar
        run: docker save bb-methodology -o bb-methodology.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bb-methodology-image
          path: bb-methodology.tar
